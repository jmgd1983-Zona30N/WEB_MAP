<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/l.control.layers.tree.css">
    <link rel="stylesheet" href="css/l.control.locate.min.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/filter.css">
    <link rel="stylesheet" href="css/nouislider.min.css">
    <link rel="stylesheet" href="css/leaflet.photon.css">
    <link rel="stylesheet" href="css/leaflet-measure.css">
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Estilos personalizados para el contenedor del logo */
        .container-logo-zona30 {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        .logo-zona30 {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
    <title>red regional de espacios naturales protegidos de asturias</title>
</head>
<body>
    <div id="map"></div>

    <!-- Scripts base de Leaflet y qgis2web -->
    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/l.control.layers.tree.min.js"></script>
    <script src="js/l.control.locate.min.js"></script>
    <script src="js/leaflet.rotatedmarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    
    <!-- El resto de tus scripts JS de capas y filtros van aquí (ej. js/Autolinker.min.js, textsign.js, filter.js, etc.) -->
    <!-- ... MANTÉN AQUÍ TODOS LOS SCRIPTS INFERIORES ORIGINALES DE TU ARCHIVO ... -->

    <!-- Script personalizado para insertar el logo debajo del filtro -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // El contenedor '#menu' es creado automáticamente por filter.js de qgis2web
            var menuPanel = document.getElementById('menu');
            
            if (menuPanel) {
                // Crear el contenedor de la imagen
                var logoDiv = document.createElement('div');
                logoDiv.className = 'container-logo-zona30';
                
                // Crear la etiqueta de la imagen con la ruta de tu repositorio
                var img = document.createElement('img');
                img.src = 'assets/logo-zona30.jpg';
                img.alt = 'Logo Zona 30 Norte';
                img.className = 'logo-zona30';
                
                // Insertar los elementos
                logoDiv.appendChild(img);
                menuPanel.appendChild(logoDiv);
            }
        });
    </script>
</body>
</html>
